name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Soroban contracts — cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  web:
    name: Frontend — vitest + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # npm install (not `npm ci`): the lockfile is generated on Windows, and a Linux
      # runner needs its own platform-specific optional deps (esbuild/rollup/etc).
      - name: Install, lint, test & build
        working-directory: web
        run: |
          npm install
          npm run lint
          npm test
          npm run build

  circuits:
    name: Circuits — witness tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # compliance.test.ts compiles compliance.circom via circomkit's WitnessTester, so
      # the circom binary must be on PATH (pinned to the version used locally). prove.test.ts
      # is pure JS but runs in the same mocha pass. No ptau/snarkjs needed for witness tests.
      - name: Install circom
        run: |
          curl -fsSL -o /usr/local/bin/circom \
            https://github.com/iden3/circom/releases/download/v2.2.3/circom-linux-amd64
          chmod +x /usr/local/bin/circom
          circom --version
      - name: Compliance circuit + prover tests
        working-directory: circuits
        run: |
          npm install
          npm test

  packages:
    name: Packages — x402 + prover
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The web app ships its own copies of the generated contract clients; regen via
      # `npm run generate` in packages/*-client keeps them byte-identical.
      - name: treasury-client — web copy in sync
        run: cmp packages/treasury-client/src/index.ts web/src/lib/treasuryClient.ts
      - name: registry-client — web copy in sync
        run: cmp packages/registry-client/src/index.ts web/src/lib/registryClient.ts
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: x402 — bounded gate tests
        working-directory: packages/x402
        run: |
          npm install
          npm test
      - name: prover — CSPRNG salt tests
        working-directory: packages/prover
        run: |
          npm install
          npm test
