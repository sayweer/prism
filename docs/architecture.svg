<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <marker id="arrY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#FDDA24"/>
    </marker>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94939c"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#FF4D5E"/>
    </marker>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FDDA24" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FDDA24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- card -->
  <rect x="0.5" y="0.5" width="1199" height="679" rx="18" fill="#0a0a0f" stroke="rgba(255,255,255,0.10)"/>
  <rect x="0.5" y="0.5" width="1199" height="679" rx="18" fill="url(#glow)"/>

  <!-- title -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="26" fill="#f3f1ec">Prism <tspan fill="#56555f" font-size="20">— architecture</tspan></text>
  <text x="48" y="84" font-size="11.5" letter-spacing="2" fill="#94939c">THE SAFETY LAYER FOR AGENT MONEY · STELLAR</text>
  <text x="1152" y="58" text-anchor="end" font-size="11" fill="#56555f">non-custodial · every rule on-chain</text>

  <!-- OWNER -->
  <rect x="48" y="150" width="222" height="104" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.16)"/>
  <text x="70" y="184" font-size="14" font-weight="bold" fill="#f3f1ec">OWNER</text>
  <text x="70" y="206" font-size="11.5" fill="#94939c">wallet · the root of trust</text>
  <text x="70" y="228" font-size="11" fill="#56555f">deploy · fund · pause · withdraw</text>

  <!-- AGENT -->
  <rect x="48" y="470" width="222" height="104" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.16)"/>
  <text x="70" y="504" font-size="14" font-weight="bold" fill="#f3f1ec">AI AGENT</text>
  <text x="70" y="526" font-size="11.5" fill="#94939c">any model, any framework</text>
  <text x="70" y="548" font-size="11" fill="#56555f">asks to pay — never holds funds</text>

  <!-- owner grants leash to agent (left rail) -->
  <line x1="159" y1="254" x2="159" y2="462" stroke="#94939c" stroke-width="1.3" marker-end="url(#arrM)"/>
  <rect x="90" y="330" width="138" height="46" rx="10" fill="#0a0a0f" stroke="#FDDA24" stroke-opacity="0.55"/>
  <text x="159" y="349" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#FDDA24">LEASH</text>
  <text x="159" y="366" text-anchor="middle" font-size="10" fill="#94939c">session key · TTL · cap</text>

  <!-- TREASURY (heart) -->
  <rect x="430" y="210" width="360" height="240" rx="14" fill="rgba(253,218,36,0.035)" stroke="#FDDA24" stroke-opacity="0.6" stroke-width="1.4"/>
  <text x="456" y="248" font-size="15" font-weight="bold" fill="#f3f1ec">BOUNDED TREASURY</text>
  <text x="456" y="268" font-size="11" fill="#94939c">Soroban contract — funds live here</text>
  <line x1="456" y1="284" x2="764" y2="284" stroke="rgba(255,255,255,0.10)"/>
  <text x="456" y="310" font-size="11.5" fill="#f3f1ec">→ payee ∈ whitelist <tspan fill="#56555f">or</tspan> reputation ≥ θ</text>
  <text x="456" y="334" font-size="11.5" fill="#f3f1ec">→ per-task cap · rolling 24h cap</text>
  <text x="456" y="358" font-size="11.5" fill="#f3f1ec">→ Leash spent ≤ session cap · not expired</text>
  <text x="456" y="382" font-size="11.5" fill="#f3f1ec">→ paused? owner-only lifecycle</text>
  <text x="456" y="424" font-size="11" fill="#FDDA24">the contract decides — not the model</text>

  <!-- owner -> treasury -->
  <line x1="270" y1="196" x2="422" y2="248" stroke="#94939c" stroke-width="1.3" marker-end="url(#arrM)"/>
  <text x="300" y="200" font-size="10.5" fill="#56555f">deploy · fund · set guardrails</text>

  <!-- agent -> treasury (pay) -->
  <line x1="270" y1="512" x2="422" y2="408" stroke="#FDDA24" stroke-width="1.4" marker-end="url(#arrY)"/>
  <text x="340" y="480" font-size="10.5" fill="#94939c">pay(task) · signed with the Leash</text>
  <text x="340" y="496" font-size="10.5" fill="#56555f">x402: a 402 quote settles the same way</text>

  <!-- PAYEE (allowed) -->
  <rect x="938" y="168" width="214" height="92" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.16)"/>
  <text x="960" y="200" font-size="13.5" font-weight="bold" fill="#f3f1ec">PAYEE</text>
  <text x="960" y="221" font-size="11" fill="#94939c">whitelisted / earned trust</text>
  <text x="960" y="242" font-size="11" fill="#56555f">USDC settles in seconds, sub-cent</text>
  <line x1="790" y1="280" x2="930" y2="222" stroke="#FDDA24" stroke-width="1.4" marker-end="url(#arrY)"/>
  <text x="800" y="236" font-size="11" fill="#FDDA24">✓ in-policy</text>

  <!-- BLOCKED (drain) -->
  <rect x="938" y="300" width="214" height="92" rx="12" fill="rgba(255,45,85,0.04)" stroke="#FF4D5E" stroke-opacity="0.5" stroke-dasharray="5 5"/>
  <text x="960" y="330" font-size="13" font-weight="bold" fill="#FF4D5E">UNKNOWN WALLET</text>
  <text x="960" y="351" font-size="11" fill="#94939c">prompt-injected drain attempt</text>
  <text x="960" y="372" font-size="10.5" fill="#FF4D5E" fill-opacity="0.8">PayeeNotWhitelisted · 0 moved</text>
  <line x1="790" y1="340" x2="930" y2="346" stroke="#FF4D5E" stroke-width="1.3" stroke-dasharray="5 5" marker-end="url(#arrR)"/>
  <text x="806" y="330" font-size="11" fill="#FF4D5E">✕ blocked</text>

  <!-- REGISTRY -->
  <rect x="938" y="452" width="214" height="92" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.16)"/>
  <text x="960" y="484" font-size="13" font-weight="bold" fill="#f3f1ec">ERC-8004 REGISTRY</text>
  <text x="960" y="505" font-size="11" fill="#94939c">agent identity · reputation</text>
  <text x="960" y="526" font-size="11" fill="#56555f">an open standard, on Stellar</text>
  <line x1="930" y1="480" x2="798" y2="404" stroke="#94939c" stroke-width="1.2" stroke-dasharray="3 5" marker-end="url(#arrM)"/>
  <text x="1152" y="440" text-anchor="end" font-size="10.5" fill="#56555f">feeds the reputation gate</text>

  <!-- ZK VERIFIER -->
  <rect x="430" y="524" width="360" height="112" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.16)"/>
  <text x="456" y="558" font-size="13.5" font-weight="bold" fill="#f3f1ec">ZK VERIFIER <tspan fill="#56555f" font-weight="normal" font-size="11">· Groth16 / BN254 · on-chain</tspan></text>
  <text x="456" y="582" font-size="11" fill="#94939c">proves the payment sat inside policy —</text>
  <text x="456" y="600" font-size="11" fill="#94939c">amount and payee stay sealed</text>
  <text x="456" y="624" font-size="11.5" fill="#FDDA24">→ emits a Sealed Receipt (attested)</text>
  <line x1="610" y1="450" x2="610" y2="516" stroke="#FDDA24" stroke-width="1.3" stroke-dasharray="5 5" marker-end="url(#arrY)"/>
  <text x="622" y="490" font-size="10.5" fill="#94939c">zero-knowledge proof</text>

  <!-- footer note -->
  <text x="48" y="650" font-size="10.5" fill="#56555f">P·R·I·S·M — Policy-enforced · Revocable · Invisible · Self-custodial · Machine-speed</text>
  <text x="1152" y="650" text-anchor="end" font-size="10.5" fill="#56555f">github.com/Bekirerdem/prism</text>
</svg>
